<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Outreach Cockpit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@500;600;700&family=Archivo:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#15171C; --steel:#1B1E24; --steel-2:#262B33; --line:#D3D6DB;
  --paper:#E9EAEC; --card:#FFFFFF; --muted:#6B7079;
  --go:#2FA05A; --due:#E8A317; --hold:#5B6A85; --rest:#D23B3B; --closed:#9AA0A8;
  --action:#15171C; --action-hover:#E8A317;
}
body{font-family:'Archivo',system-ui,sans-serif;color:var(--ink);background:var(--paper);min-height:100vh;-webkit-font-smoothing:antialiased;}
.oc-mono{font-family:'JetBrains Mono',ui-monospace,monospace;}

.oc-bar{background:var(--steel);color:#F3F4F6;padding:14px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:sticky;top:0;z-index:40;border-bottom:3px solid var(--action-hover);}
.oc-logo{font-family:'Archivo Narrow',sans-serif;font-weight:700;letter-spacing:.06em;font-size:19px;text-transform:uppercase;display:flex;align-items:center;gap:10px;}
.oc-logo .dot{width:11px;height:11px;border-radius:2px;background:var(--action-hover);box-shadow:0 0 0 3px rgba(232,163,23,.25);}
.oc-tallies{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;}
.oc-tally{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 9px;border-radius:5px;background:var(--steel-2);display:flex;align-items:center;gap:6px;letter-spacing:.02em;}
.oc-tally .n{font-weight:700;font-size:13px;}
.oc-tally .lt{width:8px;height:8px;border-radius:50%;}

.oc-shell{display:grid;grid-template-columns:1fr 420px;gap:0;max-width:1240px;margin:0 auto;}
.oc-board{padding:18px 20px 60px;min-height:60vh;}
.oc-pane{border-left:1px solid var(--line);background:#F4F5F6;padding:20px;min-height:calc(100vh - 56px);position:sticky;top:56px;align-self:start;}

.oc-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
.oc-search{flex:1;min-width:160px;padding:9px 12px;border:1px solid var(--line);border-radius:7px;background:var(--card);font-family:'Archivo',sans-serif;font-size:14px;}
.oc-filters{display:flex;gap:6px;flex-wrap:wrap;}
.oc-chip{font-family:'JetBrains Mono',monospace;font-size:11px;padding:6px 10px;border-radius:20px;border:1px solid var(--line);background:var(--card);cursor:pointer;letter-spacing:.02em;color:var(--muted);}
.oc-chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

.oc-row{display:flex;align-items:stretch;background:var(--card);border:1px solid var(--line);border-radius:9px;margin-bottom:9px;overflow:hidden;cursor:pointer;transition:box-shadow .12s ease,transform .12s ease;}
.oc-row:hover{box-shadow:0 4px 14px rgba(20,23,28,.09);transform:translateY(-1px);}
.oc-row.sel{outline:2px solid var(--action-hover);outline-offset:-1px;}
.oc-signal{width:8px;flex-shrink:0;}
.oc-row-main{padding:12px 14px;flex:1;min-width:0;}
.oc-row-top{display:flex;align-items:baseline;gap:8px;}
.oc-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oc-co{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oc-row-meta{display:flex;gap:10px;margin-top:5px;align-items:center;flex-wrap:wrap;}
.oc-flag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;border-radius:4px;background:#EEF0F2;color:var(--muted);letter-spacing:.03em;text-transform:uppercase;}
.oc-status-line{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.04em;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;align-items:flex-end;text-align:right;min-width:118px;border-left:1px dashed var(--line);}
.oc-status-line .big{font-weight:700;}
.oc-status-line .sub{color:var(--muted);font-size:10px;margin-top:2px;}

.oc-empty{text-align:center;padding:56px 20px;color:var(--muted);}
.oc-empty h3{font-family:'Archivo Narrow',sans-serif;text-transform:uppercase;letter-spacing:.05em;color:var(--ink);font-size:20px;margin-bottom:8px;}
.oc-empty p{max-width:360px;margin:0 auto 18px;font-size:14px;line-height:1.5;}

.oc-btn{font-family:'Archivo',sans-serif;font-weight:600;font-size:14px;padding:10px 16px;border-radius:7px;border:1px solid var(--action);background:var(--action);color:#fff;cursor:pointer;transition:background .12s;text-decoration:none;display:inline-block;text-align:center;}
.oc-btn:hover{background:#000;}
.oc-btn.amber{background:var(--action-hover);border-color:var(--action-hover);color:var(--ink);}
.oc-btn.amber:hover{background:#d69512;}
.oc-btn.ghost{background:transparent;color:var(--ink);border-color:var(--line);}
.oc-btn.ghost:hover{background:#EDEEF0;}
.oc-btn.sm{padding:7px 11px;font-size:12.5px;}
.oc-btn:disabled{opacity:.45;cursor:not-allowed;}
.oc-btn:focus-visible,.oc-chip:focus-visible,.oc-search:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--action-hover);outline-offset:2px;}

.oc-pane-h{font-family:'Archivo Narrow',sans-serif;text-transform:uppercase;letter-spacing:.05em;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.oc-pane-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
.oc-field{margin-bottom:14px;}
.oc-field label{display:block;font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.oc-input,.oc-select,.oc-area{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:7px;background:var(--card);font-family:'Archivo',sans-serif;font-size:14px;}
.oc-area{resize:vertical;min-height:120px;line-height:1.5;}
.oc-seg{display:flex;gap:6px;flex-wrap:wrap;}
.oc-seg button{flex:1;min-width:64px;padding:8px 6px;border:1px solid var(--line);background:var(--card);border-radius:7px;font-size:12.5px;font-weight:500;cursor:pointer;font-family:'Archivo',sans-serif;}
.oc-seg button.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.oc-note{background:#FBF3DE;border:1px solid #E9CE82;color:#7A5B10;font-size:12.5px;padding:10px 12px;border-radius:7px;margin-bottom:14px;line-height:1.45;}
.oc-note.stop{background:#FBE6E6;border-color:#E9A0A0;color:#912626;}
.oc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.oc-touch{border-top:1px solid var(--line);margin-top:18px;padding-top:14px;}
.oc-touch h4{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.oc-touch-item{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink);padding:5px 0;border-bottom:1px dotted var(--line);display:flex;justify-content:space-between;gap:10px;}
.oc-touch-item .g{color:var(--muted);}

.oc-back{display:none;}
.oc-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.25);border-top-color:var(--ink);border-radius:50%;animation:ocspin .7s linear infinite;vertical-align:-2px;margin-right:7px;}
@keyframes ocspin{to{transform:rotate(360deg);}}

@media (max-width:860px){
  .oc-shell{grid-template-columns:1fr;}
  .oc-pane{position:static;border-left:none;border-top:1px solid var(--line);min-height:auto;}
  .oc-pane.hidden-m{display:none;}
  .oc-board.hidden-m{display:none;}
  .oc-back{display:inline-flex;}
  .oc-status-line{min-width:96px;}
}
@media (prefers-reduced-motion:reduce){ .oc-row,.oc-btn,.oc-spin{transition:none;animation:none;} }
</style>
